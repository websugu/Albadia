<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incoming Call</title>
  <link rel="stylesheet" href="CSS/call.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .calling-container { text-align: center; padding: 40px; }
    .caller-image { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #4a90e2; margin-bottom: 30px; }
    .caller-name { font-size: 28px; margin-bottom: 10px; }
    .calling-status { font-size: 18px; color: #4a90e2; margin-bottom: 50px; }
    .call-actions { display: flex; justify-content: center; gap: 40px; }
    .call-btn { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
    .call-btn:hover { transform: scale(1.1); }
    .accept-call-btn { background-color: #27ae60; color: white; }
    .reject-call-btn { background-color: #e74c3c; color: white; }
    .call-btn i { font-size: 28px; }
    #timer { font-size: 20px; margin-top: 20px; color: #4a90e2; }
  </style>
</head>
<body>
  <div class="calling-container">
    <img id="caller-image" src="images/default-profile.png" alt="Caller Image" class="caller-image">
    <h2 id="caller-name" class="caller-name">Incoming Call...</h2>
    <p id="call-status" class="calling-status">Incoming voice call</p>
    <div class="call-actions">
      <button id="reject-btn" class="call-btn reject-call-btn"><i class="ri-phone-line"></i></button>
      <button id="accept-btn" class="call-btn accept-call-btn"><i class="ri-phone-fill"></i></button>
    </div>
    <div id="timer"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, addDoc, collection } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBX74wlrm96EE9zO7QQYSI21xGp_eO40IE",
      authDomain: "posts-c532d.firebaseapp.com",
      projectId: "posts-c532d",
      storageBucket: "posts-c532d.appspot.com",
      messagingSenderId: "742123859279",
      appId: "1:742123859279:web:13ba1af7ac53774a1e693a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let peerConnection = null;
    let localStream = null;
    let callTimer = null;
    let callDuration = 0;
    let callStartTime = null;
    let chatId = null;
    let callerId = null;

    const urlParams = new URLSearchParams(window.location.search);
    chatId = urlParams.get("chatId");
    callerId = urlParams.get("callerId");

    if (!chatId || !callerId) {
      alert("Invalid call");
      window.location.href = "chats.html";
    }

    const iceServers = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }] };

    async function initIncomingCall() {
      try {
        const callerDoc = await getDoc(doc(db, "users", callerId));
        if (callerDoc.exists()) {
          const callerData = callerDoc.data();
          document.getElementById("caller-name").textContent = callerData.firstName + " " + callerData.lastName;
          document.getElementById("caller-image").src = callerData.profileImageUrl || "images/default-profile.png";
        }

        const callDocRef = doc(db, "calls", chatId);
        onSnapshot(callDocRef, async function(snapshot) {
          const data = snapshot.data();
          if (!data || data.status === "ended" || data.status === "rejected") {
            document.getElementById("call-status").textContent = "Call ended";
            setTimeout(function() { window.location.href = "chats.html"; }, 2000);
          }
        });
      } catch (error) {
        console.error("Error initializing incoming call:", error);
      }
    }

    async function saveCallHistory(direction, status, duration) {
      try {
        // Save to current user's history
        await addDoc(collection(db, "users", currentUser.uid, "callHistory"), {
          contactId: callerId,
          type: "audio",
          direction: direction,
          status: status,
          duration: duration,
          timestamp: Date.now()
        });

        // Save to caller's history
        await addDoc(collection(db, "users", callerId, "callHistory"), {
          contactId: currentUser.uid,
          type: "audio",
          direction: direction === "incoming" ? "outgoing" : "incoming",
          status: status,
          duration: duration,
          timestamp: Date.now()
        });
      } catch (error) {
        console.error("Error saving call history:", error);
      }
    }

    async function acceptCall() {
      try {
        document.getElementById("call-status").textContent = "Connecting...";
        
        // Clear incoming call notification
        await updateDoc(doc(db, "users", currentUser.uid), { incomingCall: null });
        
        // Request microphone access
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        
        peerConnection = new RTCPeerConnection(iceServers);
        
        localStream.getTracks().forEach(function(track) {
          peerConnection.addTrack(track, localStream);
        });

        peerConnection.onicecandidate = function(event) {
          if (event.candidate) {
            updateDoc(doc(db, "calls", chatId), {
              ["calleeCandidates." + currentUser.uid]: { type: "candidate", candidate: event.candidate.toJSON(), timestamp: Date.now() }
            });
          }
        };

        peerConnection.ontrack = function(event) {
          console.log("Received remote track:", event.track);
          const remoteAudio = document.createElement("audio");
          remoteAudio.id = "remote-audio";
          remoteAudio.autoplay = true;
          remoteAudio.playsInline = true;
          remoteAudio.srcObject = event.streams[0];
          document.body.appendChild(remoteAudio);
          remoteAudio.play().catch(e => console.error("Error playing remote audio:", e));
        };

        peerConnection.onconnectionstatechange = function() {
          console.log("Connection state:", peerConnection.connectionState);
          if (peerConnection.connectionState === "connected") {
            document.getElementById("call-status").textContent = "Connected";
            callStartTime = Date.now();
            startCallTimer();
          } else if (peerConnection.connectionState === "disconnected" || peerConnection.connectionState === "failed") {
            endCall();
          }
        };

        const callDoc = await getDoc(doc(db, "calls", chatId));
        const callData = callDoc.data();
        
        if (callData && callData.offer) {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
          
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);
          
          await updateDoc(doc(db, "calls", chatId), {
            answer: answer,
            status: "accepted"
          });
        }

        const callDocRef = doc(db, "calls", chatId);
        onSnapshot(callDocRef, async function(snapshot) {
          const data = snapshot.data();
          if (data && data.candidates) {
            for (const key in data.candidates) {
              if (key !== currentUser.uid && data.candidates[key].candidate) {
                try {
                  await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidates[key].candidate));
                } catch (e) { console.error("Error adding ICE candidate:", e); }
              }
            }
          }
        });

      } catch (error) {
        console.error("Error accepting call:", error);
        alert("Failed to accept call: " + error.message);
      }
    }

    async function rejectCall() {
      try {
        // Save missed call to history
        await saveCallHistory("incoming", "missed", 0);
        
        // Clear incoming call notification
        await updateDoc(doc(db, "users", currentUser.uid), { incomingCall: null });
        await updateDoc(doc(db, "calls", chatId), { status: "rejected" });
        window.location.href = "chats.html";
      } catch (error) {
        console.error("Error rejecting call:", error);
        window.location.href = "chats.html";
      }
    }

    function startCallTimer() {
      callTimer = setInterval(function() {
        callDuration++;
        const minutes = Math.floor(callDuration / 60);
        const seconds = callDuration % 60;
        document.getElementById("timer").textContent = minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
      }, 1000);
    }

    async function endCall() {
      if (localStream) localStream.getTracks().forEach(function(track) { track.stop(); });
      if (peerConnection) peerConnection.close();
      if (callTimer) clearInterval(callTimer);

      const duration = callStartTime ? Math.floor((Date.now() - callStartTime) / 1000) : 0;
      const status = callStartTime ? "completed" : "missed";

      // Save call history
      await saveCallHistory("incoming", status, duration);

      if (chatId) {
        try {
          await updateDoc(doc(db, "calls", chatId), { status: "ended" });
        } catch (e) { console.log("Error updating call status:", e); }
      }
      window.location.href = "chats.html";
    }

    document.getElementById("accept-btn").addEventListener("click", acceptCall);
    document.getElementById("reject-btn").addEventListener("click", rejectCall);

    onAuthStateChanged(auth, async function(user) {
      if (user) {
        currentUser = user;
        await initIncomingCall();
      } else {
        window.location.href = "auth.html";
      }
    });
  </script>
</body>
</html>
